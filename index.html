<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✓</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-content">
        <h1>Todo</h1>
        <p class="header-subtitle">Stay organized, get things done</p>
      </div>
    </header>

    <main class="main-content">
      <div class="todo-card">
        <!-- Add Todo Form -->
        <form class="todo-form" id="todo-form">
          <div class="input-wrapper">
            <span class="input-icon">+</span>
            <input
              type="text"
              id="todo-input"
              class="todo-input"
              placeholder="What needs to be done?"
              autocomplete="off"
              autofocus
            />
          </div>
          <button type="submit" class="add-btn" id="add-btn">
            Add
          </button>
        </form>

        <!-- Filters -->
        <div class="filters" id="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <!-- Todo List -->
        <div class="todo-list" id="todo-list">
          <!-- Todos rendered here -->
        </div>

        <!-- Footer -->
        <div class="todo-footer" id="todo-footer">
          <span class="items-count" id="items-count">0 items left</span>
          <button class="clear-btn" id="clear-btn">Clear completed</button>
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">📝</div>
          <p class="empty-text">No todos yet</p>
          <p class="empty-hint">Add one above to get started!</p>
        </div>

        <!-- Data Safety Bar -->
        <div class="data-safety-bar">
          <span class="safety-status" id="backup-status" title="Data saved & backed up">
            <span class="safety-dot"></span>
            Auto-backed up
          </span>
          <div class="safety-actions">
            <input type="file" id="import-file" accept=".json" style="display:none" />
            <button class="safety-btn" id="import-btn" title="Restore todos from a backup file">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Import
            </button>
            <button class="safety-btn" id="export-btn" title="Download all todos as a JSON backup file">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Export
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
